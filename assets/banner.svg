<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <linearGradient id="redisGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#dc2626" opacity="0.05"/>
  <circle cx="1100" cy="300" r="200" fill="#ef4444" opacity="0.05"/>
  <circle cx="600" cy="400" r="180" fill="#f87171" opacity="0.03"/>
  
  <!-- Redis logo simplified (stacked cubes) -->
  <g transform="translate(150, 200)">
    <path d="M0 -40 L40 -20 L40 20 L0 40 L-40 20 L-40 -20 Z" fill="none" stroke="url(#redisGradient)" stroke-width="3" opacity="0.7"/>
    <path d="M-40 -20 L0 0 L40 -20" fill="none" stroke="url(#redisGradient)" stroke-width="2" opacity="0.5"/>
    <path d="M0 0 L0 40" fill="none" stroke="url(#redisGradient)" stroke-width="2" opacity="0.5"/>
    <ellipse cx="0" cy="-25" rx="25" ry="10" fill="url(#redisGradient)" opacity="0.6"/>
  </g>
  
  <!-- Connection/network icon -->
  <g transform="translate(1050, 200)">
    <circle cx="-25" cy="-25" r="12" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.7"/>
    <circle cx="25" cy="-25" r="12" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="25" r="12" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.7"/>
    <line x1="-15" y1="-15" x2="15" y2="-15" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
    <line x1="-15" y1="-15" x2="-5" y2="15" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
    <line x1="15" y1="-15" x2="5" y2="15" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">
    @abdokouta/redis
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">
    Redis Connection Manager for React
  </text>
  
  <!-- Tagline with gradient -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="url(#accentGradient)">
    Upstash • Multiple Connections • Connection Pool • React Hooks
  </text>
  
  <!-- Bottom accent line -->
  <rect x="400" y="320" width="400" height="4" rx="2" fill="url(#accentGradient)" opacity="0.8"/>
</svg>
