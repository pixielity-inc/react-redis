<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="50%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
    <linearGradient id="refineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#14b8a6" opacity="0.05"/>
  <circle cx="1100" cy="300" r="200" fill="#2dd4bf" opacity="0.05"/>
  <circle cx="600" cy="400" r="180" fill="#5eead4" opacity="0.03"/>
  
  <!-- Refine/Data icon (database with arrows) -->
  <g transform="translate(150, 200)">
    <!-- Database cylinder -->
    <ellipse cx="0" cy="-30" rx="35" ry="12" fill="none" stroke="url(#refineGradient)" stroke-width="2.5" opacity="0.8"/>
    <path d="M-35 -30 L-35 30" fill="none" stroke="url(#refineGradient)" stroke-width="2.5" opacity="0.8"/>
    <path d="M35 -30 L35 30" fill="none" stroke="url(#refineGradient)" stroke-width="2.5" opacity="0.8"/>
    <ellipse cx="0" cy="30" rx="35" ry="12" fill="none" stroke="url(#refineGradient)" stroke-width="2.5" opacity="0.8"/>
    <!-- Middle ellipse -->
    <ellipse cx="0" cy="0" rx="35" ry="12" fill="none" stroke="url(#refineGradient)" stroke-width="1.5" opacity="0.5"/>
    <!-- Refresh arrows -->
    <path d="M-50 0 A 15 15 0 0 1 -50 -20" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
    <path d="M50 0 A 15 15 0 0 0 50 20" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- DI/Injection icon -->
  <g transform="translate(1050, 200)">
    <!-- Container box -->
    <rect x="-35" y="-35" width="70" height="70" rx="8" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.7"/>
    <!-- Inner components -->
    <circle cx="-12" cy="-12" r="10" fill="none" stroke="url(#refineGradient)" stroke-width="2" opacity="0.6"/>
    <circle cx="12" cy="-12" r="10" fill="none" stroke="url(#refineGradient)" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="15" r="10" fill="none" stroke="url(#refineGradient)" stroke-width="2" opacity="0.6"/>
    <!-- Connection lines -->
    <line x1="-5" y1="-5" x2="-3" y2="8" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.5"/>
    <line x1="5" y1="-5" x2="3" y2="8" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">
    @abdokouta/refine
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">
    Refine Framework Integration with Dependency Injection
  </text>
  
  <!-- Tagline with gradient -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="url(#accentGradient)">
    Data Provider • CRUD Operations • React Hooks • Type-Safe
  </text>
  
  <!-- Bottom accent line -->
  <rect x="400" y="320" width="400" height="4" rx="2" fill="url(#accentGradient)" opacity="0.8"/>
</svg>
