# =============================================================================
# Publish to npm — @abdokouta/react-redis
# =============================================================================
# Publishes the redis package to npm when a version tag is pushed.
# Triggered by tags matching v* (e.g., v1.1.0).
#
# Requirements:
# - NPM_TOKEN secret must be configured in repository settings
# =============================================================================

name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm run test

      - name: Publish @abdokouta/react-redis
        run: pnpm publish --access public --no-git-checks
        working-directory: packages/redis
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
